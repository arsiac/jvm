name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  BINARY_NAME: jvm

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Run tests
        run: cargo test

  build:
    name: Build and package
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - run: cargo build --release

      - name: Package artifact
        shell: bash
        run: |
          VERSION="$(grep '^version = ' Cargo.toml | sed 's/.*"\(.*\)"/\1/')"
          BINARY="${{ env.BINARY_NAME }}"
          strip "target/release/$BINARY"
          mkdir -p dist
          cp "target/release/$BINARY" dist/
          cd dist
          zip -r "../${{ env.BINARY_NAME }}-${VERSION}-linux-amd64.zip" "$BINARY"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-linux-amd64
          path: ${{ env.BINARY_NAME }}-*.zip
