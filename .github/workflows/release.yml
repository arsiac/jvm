name: Release

on:
  push:
    tags:
      - 'v*'

env:
  BINARY_NAME: jvm

jobs:
  build:
    name: Build ${{ matrix.artifact_os }}-${{ matrix.artifact_arch }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_os: linux
            artifact_arch: amd64
            ext: ""
          - os: macos-13
            target: x86_64-apple-darwin
            artifact_os: macos
            artifact_arch: amd64
            ext: ""
          - os: macos-25
            target: aarch64-apple-darwin
            artifact_os: macos
            artifact_arch: aarch64
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_os: windows
            artifact_arch: amd64
            ext: ".exe"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - run: cargo build --release --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BINARY="${{ env.BINARY_NAME }}${{ matrix.ext }}"
          if [ "${{ runner.os }}" != "Windows" ]; then
            strip "target/${{ matrix.target }}/release/$BINARY"
          fi
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/$BINARY" dist/
          cd dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "../${{ env.BINARY_NAME }}-${VERSION}-${{ matrix.artifact_os }}-${{ matrix.artifact_arch }}.zip" "$BINARY"
          else
            zip -r "../${{ env.BINARY_NAME }}-${VERSION}-${{ matrix.artifact_os }}-${{ matrix.artifact_arch }}.zip" "$BINARY"
          fi
        working-directory: ${{ github.workspace }}

      - uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.BINARY_NAME }}-*.zip
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
